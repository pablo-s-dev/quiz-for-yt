<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz for YouTube</title>
    <style>
        :root {
            --as-bg: #f6f8fb;
            --as-surface: #ffffff;
            --as-border: #dce3eb;
            --as-text: #111827;
            --as-muted: #5f6f7c;
            --as-primary: #1f6f8b;
            --as-primary-hover: #2482a4;
            --as-danger: #a63737;
            --as-danger-hover: #bf4545;
            --as-soft: #edf4f7;
            --as-navbar-height: 54px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 580px;
            overflow: hidden;
        }

        body {
            margin: 0;
            width: 380px;
            height: 580px;
            color: var(--as-text);
            background: var(--as-bg);
            font-family: Inter, Arial, sans-serif;
        }

        .popup_root {
            height: 100%;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .quiz_brand_container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quiz_official_icon {
            font-size: 24px;
            color: #ffffff;
        }

        .quiz_header {
            padding: 18px 20px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .popup_navbar {
            height: var(--as-navbar-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: rgba(246, 248, 251, 0.86);
            border-bottom: 1px solid var(--as-border);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .popup_brand {
            display: flex;
            align-items: center;
        }

        .popup_title {
            margin: 0;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: -0.01em;
            color: #101820;
            line-height: 1.1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .popup_subtitle {
            margin: 0;
            font-size: 12px;
            color: var(--as-muted);
            line-height: 1.1;
        }

        .navbar_close.quiz_official_icon {
            width: 24px;
            height: 24px;
            min-width: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        .navbar_close_btn {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: 1px solid rgba(17, 24, 39, 0.08);
            background: rgba(255, 255, 255, 0.72);
            color: rgba(17, 24, 39, 0.78);
            box-shadow: 0 6px 16px rgba(17, 24, 39, 0.10);
            cursor: pointer;
            transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
        }

        .navbar_close_btn:hover {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 10px 22px rgba(17, 24, 39, 0.14);
        }

        .navbar_close_btn:active {
            transform: translateY(1px) scale(0.98);
        }

        .navbar_close_btn:focus-visible {
            outline: 0;
            box-shadow: 0 0 0 3px rgba(31, 111, 139, 0.22), 0 10px 22px rgba(17, 24, 39, 0.14);
        }

        .navbar_close_btn .as_button_icon svg {
            display: block;
        }

        .popup_scroll {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 14px;
        }

        h1,
        h2 {
            margin: 0;
            color: #101820;
        }

        h1 {
            font-size: 18px;
        }

        h2 {
            font-size: 14px;
        }

        .section {
            margin-top: 14px;
            padding: 12px;
            border: 1px solid var(--as-border);
            border-radius: 8px;
            background: var(--as-surface);
        }

        label {
            display: block;
            margin-top: 10px;
            margin-bottom: 4px;
            font-size: 12px;
            font-weight: 700;
        }

        input,
        select {
            width: 100%;
            height: 34px;
            padding: 7px;
            border: 1px solid #c9d2dc;
            border-radius: 6px;
            font-size: 13px;
        }

        .button_row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        button {
            min-height: 34px;
            padding: 8px 10px;
            border: 0;
            border-radius: 6px;
            background: var(--as-primary);
            color: #ffffff;
            font-weight: 700;
            cursor: pointer;
        }

        .official_brand_icon {
            font-size: 22px;
            color: #ffffff;
            margin-right: 6px;
            display: inline-block;
            vertical-align: middle;
        }

        .as_button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            min-height: 36px;
            border-radius: 7px;
            background: var(--as-primary);
            color: #ffffff;
            font-weight: 700;
            box-shadow: 0 6px 16px rgba(31, 111, 139, 0.16);
            transition: background 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
            white-space: nowrap;
        }

        .as_button:hover {
            background: var(--as-primary-hover);
            box-shadow: 0 8px 20px rgba(31, 111, 139, 0.22);
        }

        .as_button:active {
            transform: translateY(1px);
        }

        .as_button_secondary {
            background: #3d4a54;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(61, 74, 84, 0.14);
        }

        .as_button_secondary:hover {
            background: #4a5a66;
            box-shadow: 0 6px 16px rgba(61, 74, 84, 0.20);
        }

        .as_button_danger {
            background: var(--as-danger);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(166, 55, 55, 0.14);
        }

        .as_button_danger:hover {
            background: var(--as-danger-hover);
            box-shadow: 0 6px 16px rgba(166, 55, 55, 0.20);
        }

        .as_button_icon {
            display: inline-flex;
            line-height: 0;
        }

        .as_button_icon svg {
            display: block;
        }

        button.full {
            width: 100%;
        }

        .hint,
        .status {
            margin: 8px 0 0;
            color: #52616b;
            font-size: 12px;
            line-height: 1.4;
        }

        .stats_grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .stat_box {
            padding: 8px;
            border-radius: 6px;
            background: var(--as-soft);
            text-align: center;
        }

        .stat_number {
            display: block;
            font-size: 16px;
            font-weight: 700;
        }

        .stat_label {
            display: block;
            margin-top: 2px;
            font-size: 11px;
            color: #52616b;
        }

        .history_list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
            max-height: 230px;
            overflow-y: auto;
        }

        .history_item {
            padding: 10px;
            border: 1px solid var(--as-border);
            border-radius: 8px;
            background: #fbfdff;
        }

        .history_title {
            margin: 0 0 6px;
            font-size: 13px;
            font-weight: 700;
            line-height: 1.35;
        }

        .history_meta {
            margin: 0;
            color: #52616b;
            font-size: 12px;
            line-height: 1.4;
        }

        .empty_state {
            margin: 10px 0 0;
            color: #52616b;
            font-size: 12px;
        }

        .hidden {
            display: none;
        }

        .creator_credit {
            padding: 12px 14px;
            text-align: center;
            font-size: 11px;
            color: #5f6f7c;
            border-top: 1px solid var(--as-border);
            background: rgba(246, 248, 251, 0.5);
        }

        .creator_credit a {
            color: var(--as-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .creator_credit a:hover {
            color: var(--as-primary-hover);
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="popup_root">
        <header class="popup_navbar">
            <div class="popup_brand">
                <span class="official_brand_icon" data-icon="mdi:clipboard-question-outline"></span>
                <p class="popup_title">Quiz for YouTube</p>
            </div>
            <button id="closePopup" class="navbar_close_btn" type="button" aria-label="Fechar"
                data-icon="mdi:close"></button>
        </header>

        <main class="popup_scroll">

            <section class="section">
                <h2 data-i18n="settings_title">Geracao</h2>
                <label for="uiLanguage" data-i18n="language_label">Idioma</label>
                <select id="uiLanguage">
                    <option value="system" data-i18n="language_system">Sistema</option>
                    <option value="en-US">English</option>
                    <option value="pt-BR">Portugues</option>
                </select>

                <label for="generationMode" data-i18n="mode_label">Modo</label>
                <select id="generationMode">
                    <option value="openai" data-i18n="mode_openai">API OpenAI com meu token</option>
                    <option value="chatgpt" data-i18n="mode_chatgpt">ChatGPT automatico</option>
                </select>

                <div id="openAiFields">
                    <label for="openAiApiKey" data-i18n="api_key_label">OpenAI API key</label>
                    <input id="openAiApiKey" type="password" placeholder="sk-...">

                    <div class="button_row">
                        <button id="saveToken" class="as_button" type="button" data-icon="mdi:content-save-outline"
                            data-i18n="save_token">Salvar token</button>
                        <button id="clearToken" class="as_button as_button_danger" type="button"
                            data-icon="mdi:delete-outline" data-i18n="clear_token">Remover token</button>
                    </div>

                    <label for="openAiModel" data-i18n="model_label">Modelo</label>
                    <input id="openAiModel" type="text" value="gpt-4o-mini">
                    <p class="hint" data-i18n="token_hint">O token fica salvo apenas no storage local da extensao e e
                        enviado direto para a OpenAI.</p>
                </div>
                <p id="settingsStatus" class="status"></p>
            </section>

            <section class="section">
                <h2 data-i18n="current_video_title">Video atual</h2>
                <div class="button_row">
                    <button id="generateCurrent" class="as_button full" type="button"
                        data-icon="mdi:play-circle-outline" data-i18n="create_current_quiz">Criar quiz do video
                        atual</button>
                </div>
                <p class="hint" data-i18n="shortcut_hint">Atalho no YouTube: Ctrl + Shift + Q.</p>
                <p id="currentStatus" class="status"></p>
            </section>

            <section class="section">
                <h2 data-i18n="history_title">Historico e estatisticas</h2>
                <div id="historyStats" class="stats_grid"></div>
                <div id="prevQuizContainer" class="history_list"></div>
            </section>
        </main>

        <footer class="creator_credit">
            Created by <a href="https://pablosan.netlify.app" target="_blank" rel="noopener noreferrer">PabloS</a>
        </footer>
    </div>

    <script src="ui-kit.js"></script>
    <script src="popup.js"></script>
</body>

</html>
